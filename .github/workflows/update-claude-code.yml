name: Update claude-code
# ---------------- SLOPED ----------------
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: update-claude-code
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Check for new version
        id: version
        run: |
          CURRENT=$(jq -r '.version' packages/claude-code/manifest.json)
          NEW=$(curl -sf 'https://registry.npmjs.org/@anthropic-ai/claude-code/latest' | jq -r '.version')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$NEW" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        if: steps.version.outputs.up_to_date == 'false'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list \
            --head "update/claude-code-${{ steps.version.outputs.new }}" \
            --state open \
            --json number \
            --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch updated manifest
        if: steps.version.outputs.up_to_date == 'false' && steps.existing_pr.outputs.exists == 'false'
        run: |
          curl -sf \
            "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${{ steps.version.outputs.new }}/manifest.json" \
            -o packages/claude-code/manifest.json

      - name: Install Nix
        if: steps.version.outputs.up_to_date == 'false' && steps.existing_pr.outputs.exists == 'false'
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build derivation
        if: steps.version.outputs.up_to_date == 'false' && steps.existing_pr.outputs.exists == 'false'
        id: build
        run: |
          set -o pipefail
          if nix-build --no-out-link \
            -E 'let inputs = import ./npins; pkgs = import inputs.nixpkgs { config.allowUnfree = true; }; in pkgs.callPackage ./packages/claude-code { }' \
            2>&1 | tee /tmp/build-log.txt; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build log
        if: steps.version.outputs.up_to_date == 'false' && steps.existing_pr.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.version.outputs.new }}
          path: /tmp/build-log.txt
          retention-days: 30

      - name: Create PR
        if: steps.version.outputs.up_to_date == 'false' && steps.existing_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update/claude-code-${{ steps.version.outputs.new }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/claude-code/manifest.json
          git commit -m "chores: update claude-code to ${{ steps.version.outputs.new }}"
          git push origin "$BRANCH"

          gh label create "auto-update" \
            --color "0075ca" \
            --description "Automated dependency update" \
            2>/dev/null || true
          gh label create "needs-attention" \
            --color "d93f0b" \
            --description "Requires manual intervention before merging" \
            2>/dev/null || true

          if [ "${{ steps.build.outputs.success }}" = "true" ]; then
            cat > /tmp/pr-body.md << 'EOF'
          ## claude-code ${{ steps.version.outputs.current }} → ${{ steps.version.outputs.new }}

          Automated manifest update. Build succeeded ✅ — ready to merge.
          EOF
            LABELS="auto-update"
          else
            cat > /tmp/pr-body.md << 'EOF'
          ## claude-code ${{ steps.version.outputs.current }} → ${{ steps.version.outputs.new }}

          ⚠️ **Manual intervention required** — the Nix derivation failed to build after updating the manifest. Additional changes to `packages/claude-code/default.nix` may be needed.

          The full build log is available as a [workflow artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          EOF
            LABELS="auto-update,needs-attention"
          fi

          gh pr create \
            --title "chores: update claude-code to ${{ steps.version.outputs.new }}" \
            --body-file /tmp/pr-body.md \
            --label "$LABELS"
